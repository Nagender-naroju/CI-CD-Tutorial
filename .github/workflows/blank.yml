name: GitHub CI|CD Learning Tutorial
on: workflow_dispatch
jobs:
  build: 
     runs-on: ubuntu-latest
     steps:
       - name: Project Build
         run: echo "Project Build Is Ready"

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Working on test cases
        run: echo "Test Passes Successfully"

  deployment:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Project Deployment
        run: echo "Project Deployed Sccessfully"
